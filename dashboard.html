<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Demand Forecasting Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 30px; background: #fafafa; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .control-panel { background: #f1f3f5; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; gap: 25px; flex-wrap: wrap; align-items: center; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 14px; color: #495057; }
        select, input[type="range"] { padding: 8px 12px; border-radius: 6px; border: 1px solid #ced4da; font-size: 14px; background: white; }
        .anomaly-box { margin-top: 25px; background: #fffdf5; border: 1px solid #ffeeba; padding: 20px; border-radius: 8px; }
        .anomaly-list { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .anomaly-item { padding: 8px 12px; border-bottom: 1px solid #dee2e6; font-size: 14px; display: flex; gap: 15px; }
        .critical { color: #dc3545; font-weight: bold; }
        .warning { color: #ffc107; font-weight: bold; }
        .info { color: #17a2b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Enterprise Demand Forecasting Dashboard</h2>
    
    <div class="control-panel">
        <div class="control-group">
            <label for="regionSelect">Target Region</label>
            <select id="regionSelect" onchange="refreshDashboardData()">
                <option value="All">All Regions</option>
                <option value="North">North Region</option>
                <option value="South">South Region</option>
                <option value="East">East Region</option>
                <option value="West">West Region</option>
            </select>
        </div>

        <div class="control-group">
            <label for="historySelect">Historical View Limit</label>
            <select id="historySelect" onchange="refreshDashboardData()">
                <option value="30">Last 30 Records</option>
                <option value="90" selected>Last 90 Records</option>
                <option value="180">Last 180 Records</option>
            </select>
        </div>

        <div class="control-group">
            <label for="confidenceSlider">Confidence Band Range: <span id="sliderVal">1.5</span>x</label>
            <input type="range" id="confidenceSlider" min="0.5" max="3.0" step="0.5" value="1.5" oninput="refreshDashboardData()">
        </div>
    </div>

    <div id="forecastChart" style="width:100%; height:500px;"></div>

    <div class="anomaly-box">
        <h3>System Deviation Logs &amp; Operational Anomalies</h3>
        <div class="anomaly-list" id="anomalyContainer">Loading logs...</div>
    </div>
</div>

<script>
function refreshDashboardData() {
    // Collect UI inputs
    const chosenRegion = document.getElementById('regionSelect').value;
    const historyWindow = document.getElementById('historySelect').value;
    const confidenceVal = document.getElementById('confidenceSlider').value;
    
    document.getElementById('sliderVal').innerText = confidenceVal;

    // Generate Dynamic Endpoint Routes
    const forecastApiUrl = `http://localhost:8000/api/forecast?region=${chosenRegion}&days_history=${historyWindow}&confidence_multiplier=${confidenceVal}`;
    const anomaliesApiUrl = `http://localhost:8000/api/anomalies?region=${chosenRegion}&days_history=${historyWindow}`;

    // ─── 1. FETCH & PLOT FORECAST METRICS ───────────────────
    fetch(forecastApiUrl)
        .then(response => response.json())
        .then(payload => {
            // Defend loop logic against missing nested keys
            const timeline = payload.dates || [];
            const actuals = payload.actual || [];
            const predictions = payload.predicted || [];
            const lowerBands = payload.lower_bound || [];
            const upperBands = payload.upper_bound || [];

            // Line definitions for Plotly engine
            const traceActual = { x: timeline, y: actuals, mode: 'lines', name: 'Actual Sales', line: { color: '#1f77b4', width: 2 } };
            const traceForecast = { x: timeline, y: predictions, mode: 'lines', name: 'Model Prediction', line: { color: '#ff7f0e', dash: 'dot', width: 2 } };
            const traceLower = { x: timeline, y: lowerBands, mode: 'lines', name: 'Lower Confidence Bound', line: { color: '#ccc', width: 1 }, showlegend: false };
            const traceUpper = { x: timeline, y: upperBands, mode: 'lines', name: 'Upper Confidence Bound', line: { color: '#ccc', width: 1 }, fill: 'tonexty', fillcolor: 'rgba(200,200,200,0.2)', showlegend: false };

            const chartLayout = {
                title: `Dynamic Operational Demand Projections (Subset: ${chosenRegion})`,
                xaxis: { title: 'Timeline Axis', type: 'category' },
                yaxis: { title: 'Volume Units' },
                hovermode: 'x unified',
                margin: { t: 50, b: 50, l: 60, r: 30 }
            };

            Plotly.newPlot('forecastChart', [traceActual, traceForecast, traceLower, traceUpper], chartLayout);
        })
        .catch(err => console.error("Error drawing forecast visualization profiles:", err));

    // ─── 2. FETCH & OVERLAY TRACKED ANOMALIES ───────────────
    fetch(anomaliesApiUrl)
        .then(response => response.json())
        .then(payload => {
            const container = document.getElementById('anomalyContainer');
            container.innerHTML = ''; 

            const targetArray = payload.anomalies_detected || [];
            
            targetArray.forEach(item => {
                const statusClass = (item.severity || 'INFO').toLowerCase();
                container.innerHTML += `
                    <div class="anomaly-item">
                        <span class="${statusClass}">[${item.severity}]</span>
                        <strong>${item.date}</strong> — 
                        <span>${item.description} (Observed: ${item.value} | Expected: ${item.expected})</span>
                    </div>`;
            });
        })
        .catch(err => {
            document.getElementById('anomalyContainer').innerText = "Failed to update target operational exception logs.";
            console.error(err);
        });
}

// Initial deployment bootstrap execution trigger
window.onload = refreshDashboardData;
</script>
</body>
</html>
